name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync (no dev path overrides; predict-rlm from PyPI)
        run: uv sync

      - name: Lint
        run: uv run ruff check src/ tests/ examples/

      - name: Unit tests (no network, no Deno, no Pi)
        run: uv run pytest -q -m "not real and not integration"
